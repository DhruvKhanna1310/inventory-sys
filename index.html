<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QuikPick Inventory Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --brand: #1A56DB;
    --brand-dark: #1340A8;
    --green: #16A34A;
    --orange: #EA580C;
    --red: #DC2626;
    --dark: #0F172A;
    --surface: #1E293B;
    --border: #334155;
    --text: #F1F5F9;
    --muted: #94A3B8;
    --radius: 12px;
  }
  body { background:var(--dark); color:var(--text); font-family:-apple-system,Arial,sans-serif; min-height:100vh; }

  /* ── HEADER ── */
  .header { background:var(--surface); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .header-logo { font-size:20px; font-weight:800; color:var(--brand); }
  .header-sub { font-size:11px; color:var(--muted); }
  .count-badge { background:var(--brand); color:white; font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; }

  /* ── MAIN ── */
  .main { padding:20px; max-width:480px; margin:0 auto; }

  /* ── SCANNER SECTION ── */
  .scanner-card { background:var(--surface); border-radius:var(--radius); overflow:hidden; margin-bottom:20px; border:1px solid var(--border); }
  .scanner-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .scanner-title { font-size:15px; font-weight:700; }
  #reader { width:100%; background:#000; min-height:200px; }
  #reader video { border-radius:0 !important; }

  .scan-btn { width:100%; padding:16px; background:var(--brand); color:white; font-size:16px; font-weight:700; border:none; cursor:pointer; transition:background 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .scan-btn:active { background:var(--brand-dark); }
  .scan-btn.scanning { background:#334155; }
  .scan-btn.scanning::before { content:""; width:16px; height:16px; border:2px solid white; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── PRODUCT FORM ── */
  .product-form { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:20px; border:1px solid var(--border); display:none; }
  .product-form.visible { display:block; }

  .api-result { background:#14352A; border:1px solid #16A34A44; border-radius:8px; padding:10px 12px; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .api-result.manual { background:#3B2000; border-color:#EA580C44; }
  .api-result-icon { font-size:20px; flex-shrink:0; }
  .api-result-text { font-size:12px; color:#4ADE80; }
  .api-result.manual .api-result-text { color:#FB923C; }

  .product-preview { display:flex; gap:12px; align-items:center; margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .product-img { width:60px; height:60px; border-radius:8px; object-fit:contain; background:#0F172A; flex-shrink:0; }
  .product-img-placeholder { width:60px; height:60px; border-radius:8px; background:#0F172A; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .product-upc { font-size:11px; color:var(--muted); font-family:monospace; }

  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
  .form-input { width:100%; background:#0F172A; border:1px solid var(--border); border-radius:8px; padding:12px; color:var(--text); font-size:15px; outline:none; }
  .form-input:focus { border-color:var(--brand); }
  .form-select { width:100%; background:#0F172A; border:1px solid var(--border); border-radius:8px; padding:12px; color:var(--text); font-size:15px; outline:none; appearance:none; }
  .form-select:focus { border-color:var(--brand); }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .save-btn { width:100%; padding:15px; background:var(--green); color:white; font-size:16px; font-weight:700; border:none; border-radius:8px; cursor:pointer; margin-top:4px; transition:opacity 0.2s; }
  .save-btn:active { opacity:0.8; }
  .save-btn:disabled { background:var(--border); cursor:not-allowed; }

  .cancel-btn { width:100%; padding:13px; background:transparent; color:var(--muted); font-size:14px; font-weight:600; border:1px solid var(--border); border-radius:8px; cursor:pointer; margin-top:8px; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--green); color:white; padding:12px 20px; border-radius:30px; font-size:14px; font-weight:600; transition:transform 0.3s; z-index:1000; white-space:nowrap; display:flex; align-items:center; gap:8px; }
  .toast.error { background:var(--red); }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ── PRODUCT LIST ── */
  .list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .list-title { font-size:15px; font-weight:700; }
  .clear-btn { font-size:12px; color:var(--red); background:none; border:none; cursor:pointer; padding:4px 8px; }

  .product-list { display:flex; flex-direction:column; gap:10px; }
  .product-item { background:var(--surface); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; gap:12px; border:1px solid var(--border); }
  .product-item-img { width:44px; height:44px; border-radius:8px; object-fit:contain; background:#0F172A; flex-shrink:0; }
  .product-item-placeholder { width:44px; height:44px; border-radius:8px; background:#0F172A; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .product-item-info { flex:1; min-width:0; }
  .product-item-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .product-item-meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .product-item-qty { background:var(--brand); color:white; font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; flex-shrink:0; }

  .empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
  .empty-icon { font-size:40px; margin-bottom:12px; }
  .empty-text { font-size:14px; }

  /* ── LOADING ── */
  .loading-overlay { position:fixed; inset:0; background:rgba(15,23,42,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:12px; display:none; }
  .loading-overlay.show { display:flex; }
  .loading-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--brand); border-radius:50%; animation:spin 0.8s linear infinite; }
  .loading-text { font-size:14px; color:var(--muted); }

  /* ── STATION SELECT ── */
  .station-card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:20px; border:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .station-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .station-info { flex:1; }
  .station-name { font-size:13px; font-weight:600; }
  .station-sub { font-size:11px; color:var(--muted); }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Looking up product...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-logo">QuikPick</div>
    <div class="header-sub">Inventory Scanner</div>
  </div>
  <div class="count-badge" id="countBadge">0 products</div>
</div>

<div class="main">

  <!-- STATION INFO -->
  <div class="station-card">
    <div class="station-dot"></div>
    <div class="station-info">
      <div class="station-name" id="stationName">Loading station...</div>
      <div class="station-sub" id="stationSub">StoreLocationID 110</div>
    </div>
  </div>

  <!-- SCANNER -->
  <div class="scanner-card">
    <div class="scanner-header">
      <span style="font-size:18px">📷</span>
      <span class="scanner-title">Barcode Scanner</span>
    </div>
    <div id="reader"></div>
    <button class="scan-btn" id="scanBtn" onclick="toggleScanner()">
      Tap to Scan Barcode
    </button>
  </div>

  <!-- PRODUCT FORM -->
  <div class="product-form" id="productForm">
    <div class="api-result" id="apiResult">
      <div class="api-result-icon" id="apiIcon">✅</div>
      <div class="api-result-text" id="apiText">Product found automatically</div>
    </div>

    <div class="product-preview">
      <div id="productImgContainer">
        <div class="product-img-placeholder" id="productPlaceholder">📦</div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px" id="previewName">—</div>
        <div class="product-upc" id="previewUpc">—</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="previewBrand">—</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Product Name *</label>
      <input type="text" class="form-input" id="fieldName" placeholder="e.g. Coca-Cola 12oz Can">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Price ($) *</label>
        <input type="number" class="form-input" id="fieldPrice" placeholder="2.99" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity *</label>
        <input type="number" class="form-input" id="fieldQty" placeholder="12" min="0" inputmode="numeric">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="fieldCategory">
        <option value="drinks">Drinks</option>
        <option value="snacks">Snacks</option>
        <option value="household">Household</option>
        <option value="dairy">Dairy</option>
        <option value="other">Other</option>
      </select>
    </div>

    <button class="save-btn" id="saveBtn" onclick="saveProduct()">Save to Database</button>
    <button class="cancel-btn" onclick="cancelForm()">Cancel — Scan Different Product</button>
  </div>

  <!-- PRODUCT LIST -->
  <div>
    <div class="list-header">
      <div class="list-title">Scanned Products</div>
      <button class="clear-btn" onclick="if(confirm('Clear all products?'))clearList()">Clear All</button>
    </div>
    <div class="product-list" id="productList">
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <div class="empty-text">No products scanned yet.<br>Tap Scan to start.</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://dwewijcyvmkhtrjdukqf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xvps2Js_SAx8LfHt58e4Uw_6fz4M8Lc';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ────────────────────────────────────────────────────────────────────
let scanner = null;
let isScanning = false;
let currentUPC = null;
let currentImageUrl = null;
let stationId = null;
let products = [];

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  // Load station
  const { data: stations, error } = await db
    .from('stations')
    .select('*')
    .eq('passport_store_id', 110)
    .limit(1);

  if (stations && stations.length > 0) {
    stationId = stations[0].id;
    document.getElementById('stationName').textContent = stations[0].name;
    document.getElementById('stationSub').textContent = `StoreLocationID ${stations[0].passport_store_id} · ${stations[0].address}`;
  }

  // Load existing products
  await loadProducts();
}

async function loadProducts() {
  const { data, error } = await db
    .from('products')
    .select('*')
    .eq('station_id', stationId)
    .order('created_at', { ascending: false });

  if (data) {
    products = data;
    renderProductList();
    updateCount();
  }
}

// ── SCANNER ──────────────────────────────────────────────────────────────────
async function toggleScanner() {
  if (isScanning) {
    await stopScanner();
  } else {
    await startScanner();
  }
}

async function startScanner() {
  const btn = document.getElementById('scanBtn');
  btn.textContent = 'Stop Scanning';
  btn.classList.add('scanning');
  isScanning = true;

  scanner = new Html5Qrcode('reader');
  try {
    await scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 280, height: 160 } },
      onScanSuccess,
      () => {}
    );
  } catch(err) {
    showToast('Camera access denied. Enable camera in browser settings.', true);
    await stopScanner();
  }
}

async function stopScanner() {
  if (scanner && isScanning) {
    try { await scanner.stop(); } catch(e) {}
  }
  isScanning = false;
  const btn = document.getElementById('scanBtn');
  btn.textContent = 'Tap to Scan Barcode';
  btn.classList.remove('scanning');
}

async function onScanSuccess(upc) {
  await stopScanner();

  // Clean UPC
  upc = upc.replace(/\D/g, '');
  if (upc.length < 8) {
    showToast('Invalid barcode. Try again.', true);
    return;
  }

  currentUPC = upc;
  document.getElementById('previewUpc').textContent = `UPC: ${upc}`;

  // Check if already in database
  const { data: existing } = await db
    .from('products')
    .select('*')
    .eq('upc', upc)
    .eq('station_id', stationId)
    .limit(1);

  if (existing && existing.length > 0) {
    showToast(`Already scanned: ${existing[0].name}`, false);
    return;
  }

  // Look up product
  showLoading('Looking up product...');
  await lookupProduct(upc);
}

// ── UPC LOOKUP ────────────────────────────────────────────────────────────────
async function lookupProduct(upc) {
  let found = false;

  // Try Open Food Facts first
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${upc}.json`);
    const data = await res.json();

    if (data.status === 1 && data.product) {
      const p = data.product;
      const name = p.product_name_en || p.product_name || '';
      const brand = p.brands || '';
      const image = p.image_url || p.image_front_url || null;
      const category = guessCategory(p.categories || '', name);

      if (name) {
        hideLoading();
        populateForm(name, brand, image, category, 'Open Food Facts');
        found = true;
      }
    }
  } catch(e) {}

  // Try UPC Item DB if not found
  if (!found) {
    try {
      const res = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${upc}`);
      const data = await res.json();

      if (data.items && data.items.length > 0) {
        const item = data.items[0];
        const name = item.title || '';
        const brand = item.brand || '';
        const image = (item.images && item.images[0]) || null;
        const category = guessCategory(item.category || '', name);

        if (name) {
          hideLoading();
          populateForm(name, brand, image, category, 'UPC Item DB');
          found = true;
        }
      }
    } catch(e) {}
  }

  // Manual entry fallback
  if (!found) {
    hideLoading();
    populateForm('', '', null, 'drinks', null);
  }
}

function guessCategory(categories, name) {
  const text = (categories + ' ' + name).toLowerCase();
  if (text.match(/water|juice|soda|cola|pepsi|energy|drink|monster|redbull|gatorade|powerade|tea|coffee|fiji/)) return 'drinks';
  if (text.match(/chip|snack|candy|chocolate|cookie|cracker|popcorn|pretzel|jerky|nut|gum|mint/)) return 'snacks';
  if (text.match(/milk|cheese|egg|dairy|yogurt/)) return 'dairy';
  if (text.match(/medicine|advil|tylenol|battery|charger|household|clean|soap|sanitizer/)) return 'household';
  return 'drinks'; // default for gas station
}

function populateForm(name, brand, imageUrl, category, source) {
  document.getElementById('fieldName').value = name;
  document.getElementById('fieldCategory').value = category || 'drinks';
  document.getElementById('fieldPrice').value = '';
  document.getElementById('fieldQty').value = '';
  document.getElementById('previewName').textContent = name || 'Enter product name below';
  document.getElementById('previewBrand').textContent = brand || '';

  currentImageUrl = imageUrl;

  // Image
  const container = document.getElementById('productImgContainer');
  if (imageUrl) {
    container.innerHTML = `<img src="${imageUrl}" class="product-img" onerror="this.style.display='none'">`;
  } else {
    container.innerHTML = `<div class="product-img-placeholder" id="productPlaceholder">🥤</div>`;
  }

  // API result banner
  const resultDiv = document.getElementById('apiResult');
  const iconEl = document.getElementById('apiIcon');
  const textEl = document.getElementById('apiText');

  if (source) {
    resultDiv.classList.remove('manual');
    iconEl.textContent = '✅';
    textEl.textContent = `Found via ${source} — review and confirm`;
  } else {
    resultDiv.classList.add('manual');
    iconEl.textContent = '✏️';
    textEl.textContent = 'Not found in database — enter details manually';
  }

  // Show form
  document.getElementById('productForm').classList.add('visible');
  document.getElementById('fieldName').focus();

  // Update preview on name change
  document.getElementById('fieldName').oninput = function() {
    document.getElementById('previewName').textContent = this.value || '—';
  };
}

// ── SAVE PRODUCT ──────────────────────────────────────────────────────────────
async function saveProduct() {
  const name = document.getElementById('fieldName').value.trim();
  const price = parseFloat(document.getElementById('fieldPrice').value);
  const qty = parseInt(document.getElementById('fieldQty').value);
  const category = document.getElementById('fieldCategory').value;

  if (!name) { showToast('Enter a product name', true); return; }
  if (!price || price <= 0) { showToast('Enter a valid price', true); return; }
  if (isNaN(qty) || qty < 0) { showToast('Enter a valid quantity', true); return; }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  const product = {
    station_id: stationId,
    upc: currentUPC,
    name: name,
    price: price,
    category: category,
    stock_quantity: qty,
    buffer_threshold: 2,
    is_active: qty > 2,
    image_url: currentImageUrl,
    manual_override: false,
  };

  const { data, error } = await db
    .from('products')
    .insert([product])
    .select();

  if (error) {
    showToast('Save failed: ' + error.message, true);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save to Database';
    return;
  }

  // Success
  showToast(`✓ ${name} saved!`);
  products.unshift(data[0]);
  renderProductList();
  updateCount();
  cancelForm();
}

function cancelForm() {
  document.getElementById('productForm').classList.remove('visible');
  currentUPC = null;
  currentImageUrl = null;
}

// ── PRODUCT LIST ──────────────────────────────────────────────────────────────
function renderProductList() {
  const list = document.getElementById('productList');

  if (products.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <div class="empty-text">No products scanned yet.<br>Tap Scan to start.</div>
      </div>`;
    return;
  }

  list.innerHTML = products.map(p => `
    <div class="product-item">
      ${p.image_url
        ? `<img src="${p.image_url}" class="product-item-img" onerror="this.style.display='none'">`
        : `<div class="product-item-placeholder">🥤</div>`}
      <div class="product-item-info">
        <div class="product-item-name">${p.name}</div>
        <div class="product-item-meta">$${parseFloat(p.price).toFixed(2)} · ${p.category} · UPC: ${p.upc || 'manual'}</div>
      </div>
      <div class="product-item-qty">${p.stock_quantity} units</div>
    </div>
  `).join('');
}

function updateCount() {
  document.getElementById('countBadge').textContent =
    `${products.length} product${products.length !== 1 ? 's' : ''}`;
}

async function clearList() {
  const { error } = await db
    .from('products')
    .delete()
    .eq('station_id', stationId);

  if (!error) {
    products = [];
    renderProductList();
    updateCount();
    showToast('All products cleared');
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Loading...';
  document.getElementById('loadingOverlay').classList.add('show');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${isError ? 'error' : ''} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
